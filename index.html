<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Exam System v11.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-off">

    <nav class="luxury-navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="btn-gold" id="btnAdminMode">🔓 UNLOCK ADMIN</button>
            </div>

            <div class="nav-center" id="adminTools">
                <button class="btn-gold" id="btnAddPage">✚ NEW PAGE</button>
                <button class="btn-gold" id="btnAddQuestion">✚ ADD QUESTION</button>
                <div class="zoom-controller">
                    <span>ZOOM:</span>
                    <input type="range" id="zoomSlider" min="0.5" max="1.1" step="0.05" value="0.8">
                </div>
            </div>

            <div class="nav-right">
                <button class="btn-gold" id="btnClearData" style="border-color: #e74c3c; color: #e74c3c;">🗑️ CLEAR DATA</button>
                <button class="btn-gold" id="btnSendTelegram" style="border-color: #0088cc; color: #0088cc;">🚀 SEND TO GROUP</button>
                <button class="btn-gold save" id="btnSave">💾 SAVE DATA</button>
            </div>
        </div>
    </nav>

    <main class="a4-container" id="mainWrapper"></main>

    <footer class="app-info">Professional Exam Generator v11.0 | Admin Editable Layout</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
